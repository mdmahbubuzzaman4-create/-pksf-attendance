<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PKSF উপস্থিতি</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1a6b3a;
  display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:12px;padding:30px;text-align:center;max-width:300px}
.logo{font-size:28px;font-weight:700;color:#1a6b3a;letter-spacing:3px}
p{color:#555;font-size:14px;margin-top:8px}
.spin{width:36px;height:36px;border:4px solid #c8e6c9;border-top-color:#1a6b3a;
  border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">PKSF</div>
  <p>উপস্থিতি ফর্ম লোড হচ্ছে…</p>
  <div class="spin"></div>
</div>
<script>
var ev = new URLSearchParams(window.location.search).get('ev') || '';
var APPS = 'https://script.google.com/macros/s/AKfycbygIyOC_a1JgPC3kZiqG3JwAv-9DBlXN2MUGJMG2cDreUHOffZKJMAkc8ZCJQyLlNuNLg/exec';
setTimeout(function(){
  window.location.replace(APPS + (ev ? '?ev=' + encodeURIComponent(ev) : ''));
}, 500);
</script>
</body>
</html>
